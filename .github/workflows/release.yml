name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  validate-tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
      - name: Require the updater signing key
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY)) {
            throw "TAURI_SIGNING_PRIVATE_KEY must be configured before a release can run."
          }
      - name: Verify tag matches project versions
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ($tag -notmatch '^v(\d+\.\d+\.\d+)$') {
            throw "Stable releases require an exact vMAJOR.MINOR.PATCH tag."
          }
          $tagVersion = $Matches[1]
          $tocVersion = ((Select-String -Path EmberSync.toc -Pattern '^## Version:\s*(.+)$').Matches[0].Groups[1].Value).Trim()
          $packageVersion = (& node -p "require('./desktop/package.json').version").Trim()
          $packageLockVersion = (& node -p "require('./desktop/package-lock.json').version").Trim()
          $tauriVersion = (& node -p "require('./desktop/src-tauri/tauri.conf.json').version").Trim()
          $cargoVersion = ((Select-String -Path desktop/src-tauri/Cargo.toml -Pattern '^version\s*=\s*"([^"]+)"' | Select-Object -First 1).Matches[0].Groups[1].Value)
          $protocolVersion = (& node -p "require('./protocol/package.json').version").Trim()
          $protocolLockVersion = (& node -p "require('./protocol/package-lock.json').version").Trim()
          $versions = @($tocVersion, $packageVersion, $packageLockVersion, $tauriVersion, $cargoVersion, $protocolVersion, $protocolLockVersion)
          if ($versions | Where-Object { $_ -ne $tagVersion }) {
            throw "Tag, addon, desktop, Cargo, protocol, and lockfile versions must match."
          }

  validate-release:
    needs: validate-tag
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            tests/addon/package-lock.json
            protocol/package-lock.json
            desktop/package-lock.json
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: desktop/src-tauri
      - name: Install Tauri system dependencies
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - run: npm ci
        working-directory: tests/addon
      - run: npm test
        working-directory: tests/addon
      - run: npm ci
        working-directory: protocol
      - run: npm test
        working-directory: protocol
      - run: npm ci
        working-directory: desktop
      - run: npm test
        working-directory: desktop
      - run: npm run build
        working-directory: desktop
      - run: cargo fmt --manifest-path desktop/src-tauri/Cargo.toml -- --check
      - run: cargo clippy --manifest-path desktop/src-tauri/Cargo.toml --all-targets --locked -- -D warnings
      - run: cargo test --manifest-path desktop/src-tauri/Cargo.toml --all-targets --locked

  desktop:
    needs: validate-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: --bundles nsis
            rust-targets: ""
          - platform: ubuntu-22.04
            args: --bundles appimage,deb,rpm
            rust-targets: ""
          - platform: macos-14
            args: --target universal-apple-darwin --bundles app,dmg
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          targets: ${{ matrix.rust-targets }}
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: desktop/src-tauri
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libfuse2 rpm
      - run: npm ci
        working-directory: desktop
      - uses: tauri-apps/tauri-action@944946e3e4cac6603d1fe8f514171e9ecd3c78aa # v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: desktop
          tagName: v__VERSION__
          releaseName: EmberSync v__VERSION__
          releaseBody: See CHANGELOG.md for this release. Native installers are initially unsigned; updater payloads are signed by EmberSync.
          releaseDraft: true
          prerelease: false
          updaterJsonPreferNsis: true
          uploadUpdaterJson: true
          uploadUpdaterSignatures: true
          args: ${{ matrix.args }}
      - name: Verify updater signature was generated
        shell: pwsh
        run: |
          $bundleRoot = Join-Path "desktop" "src-tauri/target"
          $signatures = @(Get-ChildItem -LiteralPath $bundleRoot -Recurse -File -Filter "*.sig")
          if ($signatures.Count -eq 0) {
            throw "Tauri did not generate a signed updater artifact for ${{ matrix.platform }}."
          }

  addon-and-checksums:
    needs: desktop
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - name: Package addon
        shell: pwsh
        run: ./scripts/package-addon.ps1 -OutputDirectory ./release-staging
      - name: Upload addon archive
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${GITHUB_REF_NAME}" release-staging/*-addon.zip --clobber
      - name: Download all release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release download "${GITHUB_REF_NAME}" --dir release-assets
      - name: Verify native and updater release completeness
        shell: pwsh
        run: |
          $files = @(Get-ChildItem -LiteralPath release-assets -File)
          foreach ($pattern in @("*.exe", "*.dmg", "*.deb", "*.rpm", "*.AppImage", "*.sig", "*-addon.zip", "latest.json")) {
            if (-not ($files | Where-Object Name -Like $pattern)) {
              throw "Release is missing required artifact pattern $pattern."
            }
          }
          $latest = Get-Content -Raw -LiteralPath release-assets/latest.json | ConvertFrom-Json
          $platforms = @($latest.platforms.PSObject.Properties)
          foreach ($prefix in @("windows-", "darwin-", "linux-")) {
            $matches = @($platforms | Where-Object Name -Like "$prefix*")
            if ($matches.Count -eq 0) {
              throw "latest.json has no signed $prefix platform entry."
            }
            foreach ($entry in $matches) {
              if ([string]::IsNullOrWhiteSpace([string]$entry.Value.url) -or
                  [string]::IsNullOrWhiteSpace([string]$entry.Value.signature)) {
                throw "latest.json entry $($entry.Name) is incomplete."
              }
            }
          }
      - name: Generate checksums
        shell: pwsh
        run: ./scripts/write-checksums.ps1 -ArtifactDirectory ./release-assets -OutputPath ./release-assets/SHA256SUMS.txt
      - name: Upload checksums and publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" release-assets/SHA256SUMS.txt --clobber
          gh release edit "${GITHUB_REF_NAME}" --draft=false --latest
